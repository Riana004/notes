services:
  postgres:
    image: postgres:15-alpine
    container_name: notes-postgres
    environment:
      POSTGRES_DB: notesdb
      POSTGRES_USER: notesuser
      POSTGRES_PASSWORD: notespass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Database/init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notesuser -d notesdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  springboot-app:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: notes-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notesdb
      SPRING_DATASOURCE_USERNAME: notesuser
      SPRING_DATASOURCE_PASSWORD: notespass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    volumes:
      - ./backend/src:/app/src  # ⬅️ Ligne ajoutée pour le hot-reload
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: